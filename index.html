<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="brand-header">
            <img class="brand-logo" src="img/cw_logo-horizontal.png" alt="charity: water logo">
        </div>
        <div class="hero-copy">
            <h1 class="game-title">Water Quest</h1>
            <p class="game-tagline">Catch the good drops, avoid the bad ones! Every clean catch helps keep the mission flowing.</p>
        </div>
        <div class="score-panel">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">40</span>s</div>
            <button id="start-btn">Start Game</button>
        </div>

        <div class="difficulty-controls" aria-label="Game difficulty">
            <button class="difficulty-btn active" data-difficulty="easy" data-tip="Standard pace with a 20-point target.">Easy</button>
            <button class="difficulty-btn" data-difficulty="medium" data-tip="Faster drops with a 20-point target.">Medium</button>
            <button class="difficulty-btn" data-difficulty="hard" data-tip="Fastest drops, only 35 seconds, and a 25-point target.">Hard</button>
        </div>
        
        <div id="game-container">
        </div>
        <div id="game-message" class="game-message"></div>

        
        <footer class="game-footer">
            <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer">charity: water</a>
            <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">Donate</a>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
